<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>E1300 Teaching Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; margin: 1.5rem; max-width: 1100px; }
    h1 { font-size: 1.25rem; }
    .muted { color: #555; font-size: 0.9rem; }
    table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
    th, td { border: 1px solid #ccc; padding: 0.4rem 0.5rem; text-align: left; }
    th { background: #f4f4f4; }
    button { padding: 0.5rem 1rem; margin-right: 0.5rem; cursor: pointer; }
    #chartWind { max-height: 320px; }
    .row { display: flex; gap: 2rem; flex-wrap: wrap; }
    .col { flex: 1 1 400px; }
  </style>
</head>
<body>
  <h1>ASTM E1300 teaching workflow</h1>
  <p class="muted">
    Oracle = code-based LR from this repo. ML = k-nearest neighbors on oracle-generated training rows (NumPy).
    Wind = logarithmic profile (see wind-data.ch). Not for production design.
  </p>
  <button type="button" id="btnDemo">Run demo analyze</button>
  <button type="button" id="btnLast">Refresh last result</button>
  <div class="row">
    <div class="col">
      <h2>Wind profile (demo curve)</h2>
      <canvas id="chartWind"></canvas>
    </div>
    <div class="col">
      <h2>Feature emphasis (pseudo-importance)</h2>
      <canvas id="chartImp"></canvas>
    </div>
  </div>
  <h2>Panel results</h2>
  <div id="tbl"></div>
  <pre id="raw" class="muted" style="white-space: pre-wrap;"></pre>
  <script>
    const api = () => window.location.origin;
    let chartWind, chartImp;

    function windCurve(z0, v1, h1) {
      const heights = [];
      const speeds = [];
      for (let h = 10; h <= 150; h += 10) {
        const h2 = Math.max(h, z0 + 0.01);
        const v2 = v1 * Math.log(h2 / z0) / Math.log(h1 / z0);
        heights.push(h);
        speeds.push(v2);
      }
      return { heights, speeds };
    }

    function drawWind(z0, v1, h1) {
      const { heights, speeds } = windCurve(z0, v1, h1);
      const ctx = document.getElementById('chartWind');
      if (chartWind) chartWind.destroy();
      chartWind = new Chart(ctx, {
        type: 'line',
        data: {
          labels: heights,
          datasets: [{ label: 'v (m/s)', data: speeds, borderColor: '#2563eb', tension: 0.2 }]
        },
        options: {
          indexAxis: 'y',
          scales: {
            x: { title: { display: true, text: 'Wind speed (m/s)' } },
            y: { title: { display: true, text: 'Height (m)' } }
          }
        }
      });
    }

    function drawImp(feat) {
      const ctx = document.getElementById('chartImp');
      if (chartImp) chartImp.destroy();
      if (!feat) return;
      const labels = Object.keys(feat);
      const data = Object.values(feat);
      chartImp = new Chart(ctx, {
        type: 'bar',
        data: { labels, datasets: [{ label: 'weight', data }] },
        options: { scales: { x: { ticks: { maxRotation: 45, minRotation: 45 } } } }
      });
    }

    function tableFrom(resp) {
      const panels = resp.panels || [];
      if (!panels.length) return '<p>No panels.</p>';
      let html = '<table><thead><tr><th>id</th><th>q (kPa)</th><th>Oracle LR</th><th>OK</th><th>Min nom.</th><th>ML nom</th><th>ML LR est</th></tr></thead><tbody>';
      for (const p of panels) {
        html += '<tr>';
        html += `<td>${p.id}</td>`;
        html += `<td>${p.wind.design_load_kpa.toFixed(3)}</td>`;
        html += `<td>${p.oracle.governing_LR_kpa.toFixed(3)}</td>`;
        html += `<td>${p.oracle.acceptable}</td>`;
        html += `<td>${p.oracle.minimum_nominal_key ?? '—'}</td>`;
        html += `<td>${p.ml.predicted_nominal_key ?? '—'}</td>`;
        html += `<td>${p.ml.predicted_governing_LR_kpa != null ? p.ml.predicted_governing_LR_kpa.toFixed(3) : '—'}</td>`;
        html += '</tr>';
      }
      html += '</tbody></table>';
      return html;
    }

    async function runDemo() {
      const body = {
        wind: { v1_m_s: 17.56, h1_m: 10, z0_m: 0.4, pressure_factor: 1.0 },
        panels: [
          { id: 'P0', width_m: 1.2, height_m: 1.5, elevation_m: 80, case: 'single_monolithic', support_family: 'monolithic_four_sides', duration: 'short', lites: [{ glass: 'AN', construction: 'monolithic' }] },
          { id: 'P1', width_m: 1.5, height_m: 2.0, elevation_m: 120, case: 'single_monolithic', support_family: 'monolithic_four_sides', duration: 'short', lites: [{ glass: 'AN', construction: 'monolithic' }] }
        ]
      };
      const r = await fetch(api() + '/api/analyze', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const data = await r.json();
      document.getElementById('tbl').innerHTML = tableFrom(data);
      document.getElementById('raw').textContent = JSON.stringify(data, null, 2);
      drawWind(body.wind.z0_m, body.wind.v1_m_s, body.wind.h1_m);
      const imp = data.panels && data.panels[0] && data.panels[0].ml && data.panels[0].ml.feature_importance;
      drawImp(imp);
    }

    async function refreshLast() {
      const r = await fetch(api() + '/api/last');
      if (!r.ok) { document.getElementById('raw').textContent = 'No last run yet.'; return; }
      const wrap = await r.json();
      const data = wrap.response;
      document.getElementById('tbl').innerHTML = tableFrom(data);
      document.getElementById('raw').textContent = JSON.stringify(wrap, null, 2);
    }

    document.getElementById('btnDemo').onclick = runDemo;
    document.getElementById('btnLast').onclick = refreshLast;
    drawWind(0.4, 17.56, 10);
  </script>
</body>
</html>
